<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadPredictor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-section">
            <div class="sidebar-label">Language</div>
            <select id="language">
                <option>🇺🇸 English</option>
                <option>🇪🇸 Español</option>
                <option>🇫🇷 Français</option>
                <option>🇩🇪 Deutsch</option>
            </select>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-label">Currency</div>
            <select id="currency">
                <option>$ US Dollar</option>
                <option>€ Euro</option>
                <option>£ British Pound</option>
                <option>¥ Japanese Yen</option>
            </select>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-label">Campaign Start</div>
            <input type="date" id="campaignStart" value="2026-05-08">
        </div>

        <div class="sidebar-section">
            <div class="sidebar-label">Campaign End</div>
            <input type="date" id="campaignEnd" value="2026-11-04">
        </div>

        <div class="sidebar-section">
            <div class="sidebar-label">Total Revenue</div>
            <input type="number" id="totalRevenue" value="10000">
        </div>

        <div class="sidebar-section">
            <div class="sidebar-label">Avg Order Value</div>
            <input type="number" id="avgOrderValue" value="1000">
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="header">
            <h1>LeadPredictor</h1>
        </div>

        <!-- Metrics Cards -->
        <div class="metrics-container">
            <div class="metric-card">
                <div class="metric-icon">📊</div>
                <div class="metric-label">Projects</div>
                <div class="metric-value" id="projectsValue">125</div>
                <div class="metric-progress">
                    <div class="metric-progress-bar" style="width: 100%;"></div>
                </div>
                <div class="metric-percentage">100%</div>
            </div>

            <div class="metric-card">
                <div class="metric-icon">📈</div>
                <div class="metric-label">Leads</div>
                <div class="metric-value" id="leadsValue">25</div>
                <div class="metric-progress">
                    <div class="metric-progress-bar" style="width: 20%;"></div>
                </div>
                <div class="metric-percentage">20%</div>
            </div>

            <div class="metric-card">
                <div class="metric-icon">👥</div>
                <div class="metric-label">Customers</div>
                <div class="metric-value" id="customersValue">10</div>
                <div class="metric-progress">
                    <div class="metric-progress-bar" style="width: 8%;"></div>
                </div>
                <div class="metric-percentage">8%</div>
            </div>
        </div>

        <!-- Chart -->
        <div class="chart-container">
            <div class="chart-title">Distribution</div>
            <div class="chart-content" id="chartContent">
                <!-- Bars will be generated by JavaScript -->
            </div>
            <div class="chart-legend">
                <span>0 people</span>
                <span>20 people</span>
                <span>40 people</span>
                <span>60 people</span>
                <span>80 people</span>
                <span>100 people</span>
                <span>120 people</span>
            </div>
        </div>

        <!-- Sliders -->
        <div class="slider-container">
            <div class="slider-item">
                <div class="slider-label">
                    <span class="slider-label-text">Lead Response Rate</span>
                    <span class="slider-value" id="leadRateValue">40.00%</span>
                </div>
                <input type="range" id="leadResponseRate" class="slider" min="0" max="100" value="40">
            </div>

            <div class="slider-item">
                <div class="slider-label">
                    <span class="slider-label-text">Prospect Response Rate</span>
                    <span class="slider-value" id="prospectRateValue">20.00%</span>
                </div>
                <input type="range" id="prospectResponseRate" class="slider" min="0" max="100" value="20">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
